---
- name: 建立使用者、部署公鑰並強化 SSH 安全性
  hosts: martinlee_lab_vm
  become: yes

  vars:
    # 這是你提供的 MacBook 公鑰
    mac_public_key: "ssh-rsa  martinlee@KKBOXdeMacBook-Pro.local"

  tasks:
    - name: 1. 建立使用者 martinlee
      ansible.builtin.user:
        name: martinlee
        shell: /bin/bash
        groups: sudo
        append: yes
        create_home: yes

    - name: 2. 部署公鑰給 kkman 與 martinlee
      ansible.posix.authorized_key:
        user: "{{ item }}"
        state: present
        key: "{{ mac_public_key }}"
      loop:
        - kkman
        - martinlee

    - name: 3. 配置 martinlee 免密碼 sudo (關鍵步驟)
      ansible.builtin.copy:
        content: "martinlee ALL=(ALL) NOPASSWD:ALL"
        dest: /etc/sudoers.d/martinlee
        mode: '0440'
        validate: 'visudo -cf %s'

    - name: 4. 停用 SSH 密碼登入
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present
      notify: 重啟 SSH 服務

    - name: 5. 停用 Root 遠端密碼登入
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'
        state: present
      notify: 重啟 SSH 服務

  handlers:
    - name: 重啟 SSH 服務
      ansible.builtin.service:
        name: ssh
        state: restarted