---
- name: 強化 SSH 安全性（使用 Key 登入並停用密碼）
  hosts: martinlee_lab_vm
  become: yes

  vars:
    # 你之前提供的特定公鑰字串
    mac_public_key: "ssh-rsa  martinlee@KKBOXdeMacBook-Pro.local"

  tasks:
    - name: 1. 確保受控端主機已放入控制節點的公鑰
      ansible.posix.authorized_key:
        user: kkman
        state: present
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"
        # 註：如果你的金鑰是 rsa，請改為 id_rsa.pub

    - name: 建立使用者 martinlee
      ansible.builtin.user:
        name: martinlee
        shell: /bin/bash
        groups: sudo
        append: yes

    - name: 部署公鑰給指定使用者
      ansible.posix.authorized_key:
        user: "{{ item }}"
        state: present
        key: "{{ mac_public_key }}"
      with_items:
        - kkman
        - martinlee


    - name: 2. 停用 SSH 密碼登入
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present
      notify: 重啟 SSH 服務

    - name: 3. 停用 Root 遠端登入 (選用，建議開啟以增加安全性)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
      notify: 重啟 SSH 服務

  handlers:
    - name: 重啟 SSH 服務
      ansible.builtin.service:
        name: ssh
        state: restarted
